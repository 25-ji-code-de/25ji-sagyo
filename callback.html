<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录中... | 25時作業風景</title>
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #f8fafc;
            font-family: system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 400px;
            padding: 2rem;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #a78bfa;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .error {
            color: #ef4444;
            margin-top: 1rem;
        }
        a {
            color: #a78bfa;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <div id="status">正在验证您的身份...</div>
    </div>

    <script src="js/utils/config.js"></script>
    <script src="js/utils/auth.js"></script>
    <script>
        function setStatus(text, isError = false) {
            const el = document.getElementById('status');
            el.textContent = '';
            if (isError) {
                const div = document.createElement('div');
                div.className = 'error';
                div.textContent = text;
                el.appendChild(div);
                const br = document.createElement('br');
                el.appendChild(br);
                const a = document.createElement('a');
                a.href = '/';
                a.textContent = '返回首页';
                el.appendChild(a);
            } else {
                el.textContent = text;
            }
        }

        async function handleCallback() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const state = urlParams.get('state');
            const error = urlParams.get('error');
            const errorDesc = urlParams.get('error_description');

            if (error) {
                setStatus(`认证失败: ${error}${errorDesc ? ' — ' + errorDesc : ''}`, true);
                return;
            }

            if (!code || !state) {
                setStatus('参数无效，正在返回...');
                setTimeout(() => { window.location.href = '/'; }, 2000);
                return;
            }

            try {
                await window.SekaiAuth.handleCallback(code, state);

                // 在跳转回首页前，把 SEKAI Pass 显示名写入 localStorage，
                // 避免首页 WebSocket 仍用访客昵称「世界」的居民_XXXX 注册。
                try {
                    const userInfo = await window.SekaiAuth.getUserInfo();
                    if (userInfo) {
                        const displayName = window.SekaiAuth.getDisplayName(userInfo, '');
                        if (displayName) {
                            localStorage.setItem('userNickname', displayName);
                        }
                    }
                } catch (profileErr) {
                    console.warn('Failed to prefetch display name before redirect:', profileErr);
                }

                setStatus('登录成功，正在跳转...');
                setTimeout(() => { window.location.href = '/'; }, 1000);
            } catch (err) {
                console.error(err);
                setStatus(`登录失败: ${err?.message || String(err)}`, true);
            }
        }

        handleCallback();
    </script>
</body>
</html>
